  text: 欽定四庫全書子部十二
  hash: sha256:b91c7627c34399fce720371900e7def4c0469982b792a8bd4a0a78b88d470d59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0005_WYG_000-1a, image: WYG1035/WYG1035-0403a.png}
body:
  text: 次柳氏舊聞小說家類一雜事之屬提要臣等謹案次柳氏舊聞一卷唐李德裕撰德裕事迹具唐書本傳是書所記皆元宗遺事凡十七則前有德裕題詞大略謂史官栁芳上元間徙黔中髙力士時亦徙巫州相與周旋因得聞禁中事記為一書曰問髙力士太和中詔求其書宰相王涯等向芳孫度支員外郎璟索之不獲而德裕父吉甫及與芳子吏部郎中冕遊嘗聞其說以告德裕德裕因追憶録進舊唐書文宗本紀載太和八年九月己未宰臣李德裕進御臣要略及柳氏舊聞三卷蓋即其事惟卷數與今本不合殆二書共為三卷歟中如元獻皇后服藥張果飲堇汁無畏三藏祈雨吳后夢金甲神興慶池小龍內道場素黃文事皆涉神怪其姚崇魏知古相傾軋及乳媪以他兒易代宗事亦似非實録姑存以備異聞可也柳珵常侍言旨案此書無别行之本此據陶宗儀說郛所載首載李輔國逼脅元宗遷西內事云此事本在朱崖太尉所續程史第十六條內蓋以避時事所以不書也考德裕所著别無所謂程史知此書初名程史後改題今名又知此書本十八條刪此一條今存十七至其名程史之義與所以改名之故則不可詳矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書次栁氏舊聞唐李德裕撰太和八年秋八月乙酉上於紫宸殿聽政宰臣王涯等奉職奏事上顧謂宰臣曰故內臣力士始終事蹟試為我言之涯即奏曰上元中史臣栁芳得罪竄黔中時力士亦徙巫州因相與周旋力士以芳嘗司史為芳言先是時禁中事皆芳所不能知而芳亦有質疑者芳默識之及次其事號曰問髙力士上亦令採訪故史氏取其書臣涯等既奉詔即召芳孫度支員外郎璟詢事璟對某祖芳前從力士問覼縷未竟後著唐厯採取義類相近者以傳之其餘或祕不敢宣或奇怪非編録所宜及者不以𫝊今按求其書亡失不獲臣德裕先臣與芳子吏部郎中冕貞元初俱為尚書郎後謫官俱東出道相與語遂及髙力士之說且曰彼皆目覩非出𫝊聞信而有徴可為實録先臣為臣言之臣伏念所憶授凡一十七章嵗祀已久遺槀不𫝊臣德裕非黃瓊之達練習見故事愧史遷之該博唯次舊聞愳失其𫝊不足以對大君之問謹編録如左以備史官之闕云𤣥宗之在東宫為太平公主所忌朝夕伺察纎微必聞於上而宫闈左右亦潜持兩端以附太平之勢時元獻皇后得幸方娠𤣥宗愳太平欲令服藥陰除之而無可與語者張說以侍讀得進見太子宫中𤣥宗從容謀及說說亦密贊其事他日說又入侍因懷去胎藥三煮劑以獻𤣥宗得藥喜盡去左右獨搆火於殿煮未及熟怠而假寐肹蠁之際有神人長丈餘具裝身披金甲操戈繞藥鼎三匝煮盡覆無餘焉𤣥宗起視異之復增火又投一劑煮於鼎因就榻瞬目以候之而神覆鼎如初凡三煮皆覆之乃止明日說又至告之故說降階再拜曰天所命也不可去之厥後元獻皇后思食酸𤣥宗亦以告說說每進輒袖木瓜以獻故開元中說恩澤莫與為比肅宗之於說子均垍相愛若親戚昆弟之子柳芳本張說所引說嘗自叙述與髙力士詞協也𤣥宗初即位體貌大臣賔禮故老尤注意於姚元崇宋璟引見便殿皆為之興罷去輒臨軒以送其他宰相優寵莫及至李林甫以宗室近屬上所拔用恩意甚厚而禮遇漸輕姚元崇為相嘗於上前叙進郎吏上顧視殿宇不答崇語崇恐再以言之冀上少售而卒不對崇益恐趨出髙力士曰陛下初承鴻業宰相請事當面言可否而崇亟言之陛下不視臣恐宰相必大愳上曰朕既任崇以庶政事之大者當奏朕與之共決如郎署吏秩甚卑會力士宣事因為言上意崇自解而喜朝廷聞者以上有人君之度得信任之道焉魏知古起諸吏為姚崇所引用及同升也崇頗輕之無何知古拜吏部尚書知東道選事以吏部尚書宋璟門下過官知古心銜之思有以中之者崇二子並分曹洛邑會知古至恃其蒙恩頗顧請託知古歸悉以聞上召崇從容謂曰卿子才乎皆何官也又安在崇揣知上意因奏曰臣有三子兩人分司東都矣其為人多欲而寡交以是必干知古然臣未及聞之耳上始以丞相子重言之欲微動崇意若崇私其子或為之𨼆及聞所奏大喜且曰卿安從知之崇曰知古微時是臣薦以至榮達臣子愚謂知古見德必容其非故必干之上於是明崇不私其子之過而薄知古之負崇也欲斥之崇為之請曰臣有子無狀撓陛下法陛下欲特原之臣為幸大矣而由臣逐知古海內臣庶必以陛下為私於臣矣非所以禆𤣥化也上久之乃許翌日以知古為工部尚書罷知政事源乾曜因奏事稱㫖上悅之於是驟拔用歷户部侍郎京兆尹以至宰相異日上獨與髙力士語曰爾知吾之拔用乾曜之速乎曰不知也上曰吾以其容貌言語類蕭至忠故用之力士對曰至忠不嘗負陛下乎陛下何念之深也上曰至忠晚乃謬計耳其初立朝得不為賢相乎上之愛才宥過聞者無不感悅蕭嵩為宰相引韓休與同列及在相位稍與嵩不合嵩因乞骸骨上慰曰朕未厭卿卿何庸去嵩俯伏曰臣待罪宰相爵位已極幸陛下未厭臣得以乞身如陛下厭臣臣首領不保又安得自遂因隕涕上為之動容曰卿言切矣朕思之未決卿歸第至夕當有使如無使明日宜如常朝請及日暮命力士詔嵩曰朕惜卿欲固留而君臣始終貴全大義亦國家之美事今除卿右丞相是日荆州始進黃柑子上以素羅帕苞苴其二以賜焉𤣥宗好神仙往往召郡國徵竒異士有張果老者則天時聞其名不能致上亟召之乃與使偕來言其所變怪不測又有邢和璞善算心術視人投算而能察善惡夭夀上使算果老懵然不知其甲子又有師夜光者善視鬼復召果老與坐密令夜光視之夜光進曰果老今安在臣願得視之而果老坐于上前已久矣夜光終莫能見上謂力士曰吾聞竒士至人外物不足以敗其中試飲以堇汁無苦者真竒士也㑹天寒甚使以汁進果老遂飲三巵醺然如醉作者顧曰非佳酒也乃寢頃之取鏡視其齒盡燋且黑命左右取鐵如意以擊齒墮而藏之于衣帶中乃納于懷內出神藥色微紅傅齒穴中不寐久之視鏡齒粲潔白上方信其不誣也𤣥宗嘗幸東都天大旱且暑時聖善寺有天竺乾僧無畏號三藏善召龍致雨之術上遣髙力士疾召無畏請雨無畏奏曰今旱數當然耳召龍必興烈風雷雨適足暴物不可為之也上强使之曰人苦暑疾雖暴風疾雷亦足快意無畏不得已乃奉詔有司為陳請雨之具幡像俱備無畏笑曰斯不足以致雨而悉命去之獨盛一鉢水以小刀攪旋之胡言數百祝水須臾有如龍狀其大類指赤色首噉水上俄復沒于鉢中無畏復以刀攪水頃之白氣自鉢中興如爐煙上數尺稍稍引出講堂外無畏謂力士曰亟去雨至矣力士絶馳去顧見白氣疾起自講堂而西如一匹練既而昏霾大風雷霆而雨力士才及天津之南風雨亦隨馬而至馳至衢中大樹多拔力士比復奏衣盡霑濕時孟溫禮為河南尹目覩其事禮子皥嘗言臣之祖先臣與力士同吏部員外李華撰無畏碑亦云前後奉詔滅火反風昭然遍諸耳目𤣥宗善八分書將命相先以御體書其姓名置案上㑹太子入視上舉金甌覆其名以告之曰宰相名汝庸能知之乎即射中賜若巵酒也肅宗拜而稱之曰非崔琳盧從願乎上曰然因舉甌以賜酒巵是時琳從願皆有宰相望𤣥宗倚為相者數矣竟以宗族蕃盛附寄者衆卒不用之也肅宗在宫為李林甫所搆勢幾危者數矣無何鬚鬢班白常早朝見上上見之愀然曰爾其歸院吾當幸汝及上至顧見宫中庭宇不灑掃而樂器久屏塵埃積其間左右使令無有妓女上為之動色顧力士曰太子居處若是將軍盍使我聞乎上在禁中不名力士呼為將軍力士曰臣嘗欲奏上太子不許曰無以勤上念上即詔力士下京兆尹亟選子女頎長潔白者五人將以賜太子力士趨出庭下復還奏曰臣他日嘗宣㫖京兆閲致子女皆囂而朝廷好言事者得以為口實臣以為掖庭中故衣冠以事沒入其家者宜可備選上大悅使力士詔掖庭令按籍閲視得三人以賜太子而章敬吳皇后在選中頃之后侍寢不寤吟呼若有痛苦氣不屬者肅宗呼之不解竊自計曰上始賜我卒無狀不寤上安知非吾護視不謹耶遽秉燭視之良久乃寤肅宗問之后以手按其左脅曰妾向夢中有神人長丈餘介金甲以操劒顧謂妾曰帝命吾與汝為子自左脅以劍決而入決處痛殆不可忍及今未之已也肅宗驗之于燭下則若有綖而赤者存焉遽以狀聞遂生代宗吳奏嘗言先臣與力士說之亦同也代宗之載誕也三日上幸東宫賜之金盤命以浴吳皇后年幼皇孫龍體未舒負媼惶惑乃以宫中諸王子同日誕而體貌豐碩者以進見上視之不樂曰此兒非吾兒也負媼扣頭具服上睨曰非爾所知趣取吾兒來於是以太子之子進見上大喜置諸掌中向日視之笑曰此兒福祿逺過其父及上起還宫盡留內樂謂力士曰此一殿有三天子樂乎哉與太子飲樂焉肅宗為太子常侍膳尚食置熟爼有羊臂臑上顧使太子割肅宗既割餘汚漫在手以餅潔之上熟視不懌肅宗徐舉餘餅啖之上甚悅謂太子曰福當如此愛惜天寶中安祿山每來朝上特異待之為置坐於殿西偏張金雞幛其來輒賜坐肅宗諫曰自古正殿無人臣坐禮陛下寵之已甚必將驕也上呼太子前曰此胡有竒相吾以此厭弭之爾興慶宫上潜龍之地聖厯初五王宅也上性友愛及即位立樓于宫西南垣署曰花萼樓朝罷與諸王遊或置酒為樂時天下無事號太平者垂五十年及祿山犯闕乘傳遽以告上欲遷幸復登樓置酒四顧悽愴乃命進玉環琵琶琵琶者睿宗所御琵琶也異時上張樂殿中常置之别榻以黃帕蓋之不以他樂雜而未嘗持用至是得工賀懷智取調之又命禪定僧段師彈時美人善歌從者三人使其中一人歌水調畢奏上將去復眷眷因視樓下問有樂工歌水調者乎一年少心悟上意自言頗工歌兼善水調使之歌曰山川滿目淚沾衣富貴榮華能幾時不見只今汾水上唯有年年秋鴈飛上聞之為之澘然出涕顧侍御者誰為此詞或對曰宰臣李嶠上曰真才子也不待曲終而去𤣥宗西幸車駕將至延英門出楊國忠請遊左藏庫而去上從之望見千餘人持火炬以俟上駐蹕曰何用此為國忠對曰請焚庫積無為盜守上斂容曰盜至若不得此當厚斂于人不如與之無重困吾赤子也命徹炬而行聞者皆感激流涕迭相謂曰吾君愛人如此福未艾也雖太王去豳何以過此上始入斜谷天尚早煙霧甚晦知頓使給事中韋倜於墅中得熟酒一壺跪獻馬前數四不為之舉倜愳乃注於他器自滿引於前上曰卿以我疑耶始吾御宇之初嘗大醉損一人吾悼之因以為戒逮今四十餘年矣未曽嘗酒味指力士近侍曰此皆知之非紿卿也從臣聞知莫不感悅上孜孜警戒如是富有天下僅五十載豈不由斯道乎天寶中興慶池上小龍常出遊宫垣南溝水中蜿蜒之狀靡不瞻觀及鑾輿西幸先一夕皆見龍乘雲雨自池中望西而去上至嘉陵江將乘舟有龍翼舟而進上泫然流涕顧左右曰此吾宫中之龍也命以酒沃酹之於是龍躍而去天寶中上於內道場為兆庶祈福親制素黃文及登壇之際其文乃自然凌空而上騰於天也聞空有言聖夀延長王公已下請編入史冊制從之次柳氏舊聞
